<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二人のチャンネル名｜公式ホームページ</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts (オシャレなフォントを読み込み) -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
</head>
<body>

    <div id="wrap">
        <!-- ヘッダー -->
        <header id="header">
            <div class="header-inner">
                <h1>二人のチャンネル名</h1>
                <nav class="pc-navi">
                    <ul>
                        <li><a href="#profile">Profile</a></li>
                        <li><a href="#twitter">Twitter / SNS</a></li>
                        <li><a href="#youtube">YouTube</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </nav>
            </div>
            <!-- ふわふわ動く装飾（後で画像を入れるとさらに可愛くなります） -->
            <div class="fi11 fuwafuwa">❤</div>
            <div class="fi12 fuwafuwa2">⭐</div>
        </header>

        <!-- メインビジュアル（二人の写真を入れる場所） -->
        <div class="main-visual">
            <p>Welcome to Our Channel!</p>
        </div>

        <!-- プロフィール -->
        <section class="contents-box" id="profile">
            <h2 class="section-title">PROFILE</h2>
            <div class="chara-wrap">
                <!-- 名前や写真は後で自分たちのものに変えてね -->
                <div class="profile-card">
                    <div class="profile-icon">A-kun</div>
                    <p>好きなもの：ゲーム、猫</p>
                </div>
                <div class="profile-card">
                    <div class="profile-icon">B-chan</div>
                    <p>好きなもの：カフェ巡り、写真</p>
                </div>
            </div>
        </section>

        <!-- SNS (Twitter) -->
        <section class="contents-box" id="twitter">
            <h2 class="section-title">SNS</h2>
            <div class="tw-wrap">
                <div class="tw-box">
                    <h3>A-kun's Twitter</h3>
                    <!-- Twitter埋め込みをここに入れる -->
                    <a class="twitter-timeline" data-height="400" href="https://twitter.com/自分のID">Tweets by ID</a>
                </div>
                <div class="tw-box">
                    <h3>B-chan's Twitter</h3>
                    <a class="twitter-timeline" data-height="400" href="https://twitter.com/自分のID">Tweets by ID</a>
                </div>
            </div>
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
        </section>

        <!-- YouTube -->
        <section class="contents-box" id="youtube">
            <h2 class="section-title">YOUTUBE</h2>
            <div class="youtube-wrap">
                <div class="movie">
                    <!-- YouTubeの共有→埋め込みコードをここに貼り付け -->
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/動画ID" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="link-btn">
                    <a href="https://www.youtube.com/@自分のチャンネル" target="_blank">チャンネル登録してね！</a>
                </div>
            </div>
        </section>

        <!-- お問い合わせ -->
        <section class="contents-box" id="contact">
            <h2 class="section-title">CONTACT</h2>
            <p>お仕事の依頼などはTwitterのDMまでお願いします！</p>
        </section>

        <footer class="footer">
            <p>&copy; 二人のチャンネル名</p>
        </footer>
    </div>

</body>
</html>
