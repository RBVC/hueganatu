<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひゅうがなつ Official Links</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- アイコンフォント（FontAwesome）を読み込み -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- プロフィール部分 -->
        <header class="profile">
            <div class="avatar">
                <!-- ここに二人の写真をいれる（今は仮のグレー円） -->
                <img src="images/profile.png" alt="Profile Picture" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <h1>ひゅうがなつ</h1>
            <p class="bio">ひゅうがとなつの公式リンク集です！🌻🌳</p>
        </header>

        <!-- リンクボタン集 -->
        <div class="links">
            <a href="https://www.youtube.com/@自分のID" class="link-card" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://twitter.com/自分のID" class="link-card" target="_blank">
                <i class="fab fa-twitter"></i> Twitter (X)
            </a>
            <a href="https://www.tiktok.com/@自分のID" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://hueganatu.notion.site/..." class="link-card" target="_blank">
                <i class="fas fa-book"></i> ガイドライン (Notion)
            </a>
            <a href="mailto:自分のアドレス" class="link-card">
                <i class="far fa-envelope"></i> お問い合わせ
            </a>
        </div>

        <!-- フッター -->
        <footer class="footer">
            <p>&copy; hueganatu</p>
        </footer>
    </div>

</body>
</html>
